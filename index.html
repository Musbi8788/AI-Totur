<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musbi - Your Tech Guide</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            padding: 1.5rem 2rem;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .upload-label {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.875rem;
            color: var(--text-muted);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .upload-label:hover {
            background: var(--glass-border);
            color: var(--text);
            border-color: var(--primary);
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 80%;
            padding: 1rem 1.5rem;
            border-radius: 1.25rem;
            line-height: 1.6;
            animation: fadeIn 0.3s ease-out;
            white-space: pre-wrap;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 0.25rem;
        }

        .ai-message {
            align-self: flex-start;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-bottom-left-radius: 0.25rem;
        }

        .system-message {
            align-self: center;
            background: transparent;
            color: var(--text-muted);
            font-size: 0.8rem;
            border: none;
            padding: 0.5rem;
        }

        .input-area {
            padding: 2rem;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--glass-border);
        }

        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 1rem;
            background: var(--card-bg);
            padding: 0.5rem;
            border-radius: 1rem;
            border: 1px solid var(--glass-border);
            transition: border-color 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: var(--primary);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text);
            padding: 0.75rem 1rem;
            font-size: 1rem;
            outline: none;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }

        button:hover {
            background: var(--primary-hover);
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        .typing-indicator {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <h1>Musbi Chatbot</h1>
        </div>
        <div class="header-actions">
            <label for="file-upload" class="upload-label">
                <span>📁 Upload Knowledge</span>
                <input type="file" id="file-upload" accept=".pdf,.txt" style="display: none;">
            </label>
            <div id="status" style="font-size: 0.875rem; color: #4ade80;">● Online</div>
        </div>
    </header>

    <div id="chat-container">
        <div class="message ai-message">
            Hello! I'm Musbi, your tech guide. I'm an IT professional here to help you learn about technology and careers in tech. What's on your mind?
        </div>
    </div>

    <div class="input-area">
        <div class="typing-indicator" id="typing">Musbi is thinking...</div>
        <div class="input-wrapper">
            <input type="text" id="user-input" placeholder="Ask Musbi anything about tech..." autocomplete="off">
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const typingIndicator = document.getElementById('typing');
        const fileUpload = document.getElementById('file-upload');

        let chatHistory = [];

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // Add user message to UI
            appendMessage('user', text);
            userInput.value = '';
            
            chatHistory.push({ role: 'user', content: text });

            // Show typing indicator
            typingIndicator.textContent = "Musbi is thinking...";
            typingIndicator.style.display = 'block';

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: chatHistory,
                        model: "openai/gpt-3.5-turbo"
                    })
                });

                if (!response.ok) throw new Error('Failed to connect to Musbi');

                const data = await response.json();
                appendMessage('ai', data.content);
                chatHistory.push({ role: 'assistant', content: data.content });
            } catch (error) {
                appendMessage('ai', "I'm sorry, I'm having trouble connecting right now. Please check the server.");
                console.error(error);
            } finally {
                typingIndicator.style.display = 'none';
            }
        }

        fileUpload.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            typingIndicator.textContent = `Processing ${file.name}...`;
            typingIndicator.style.display = 'block';

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                if (data.message) {
                    appendMessage('system', data.message);
                } else if (data.error) {
                    appendMessage('ai', `Error: ${data.error}`);
                }
            } catch (error) {
                appendMessage('ai', "Failed to upload document.");
            } finally {
                typingIndicator.textContent = "Musbi is thinking...";
                typingIndicator.style.display = 'none';
                fileUpload.value = '';
            }
        });

        function appendMessage(role, content) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}-message`;
            msgDiv.textContent = content;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
